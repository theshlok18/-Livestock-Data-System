services:
  # ── Backend (Flask API) ──────────────────────────────────────────────────
  - type: web
    name: livestock-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: gunicorn app:create_app() --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FRONTEND_URL
        value: https://livestock-frontend.onrender.com   # update after deploy
      - key: DB_PATH
        value: /opt/render/project/src/livestock.db
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/uploads

  # ── Frontend (React/Vite) ────────────────────────────────────────────────
  - type: web
    name: livestock-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://livestock-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
