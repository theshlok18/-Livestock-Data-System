services:

  # ── Backend (Flask + Gunicorn) ────────────────────────────────────────────
  - type: web
    name: livestock-backend
    runtime: python
    rootDir: livestock-app/backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python init_db.py
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FRONTEND_URL
        value: https://livestock-frontend.onrender.com
      - key: DB_PATH
        value: /opt/render/project/src/livestock-app/backend/livestock.db
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/livestock-app/backend/uploads

  # ── Frontend (React/Vite static) ─────────────────────────────────────────
  - type: web
    name: livestock-frontend
    runtime: static
    rootDir: livestock-app/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://livestock-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
